<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Space Shooter</title>
<style>
body{
    margin:0;
    overflow:hidden;
    background:#000;
}
canvas{
    display:block;
    margin:auto;
    background:linear-gradient(#000,#050520);
}
</style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = 1200;
canvas.height = 700;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq,duration,type="square"){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    gain.gain.setValueAtTime(0.1,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(
        0.0001,
        audioCtx.currentTime + duration
    );
    osc.stop(audioCtx.currentTime + duration);
}

const player={
    x:canvas.width/2,
    y:canvas.height-100,
    w:50,
    h:50,
    speed:7,
    hp:100,
    weapon:1
};

let bullets=[];
let enemies=[];
let explosions=[];
let stars=[];
let score=0;
let boss=null;

for(let i=0;i<200;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        s:Math.random()*2+1
    });
}

const keys={};

document.addEventListener("keydown",e=>{
    keys[e.key]=true;

    if(e.key==="1") player.weapon=1;
    if(e.key==="2") player.weapon=2;
    if(e.key==="3") player.weapon=3;
});

document.addEventListener("keyup",e=>{
    keys[e.key]=false;
});

function shoot(){

    beep(600,0.05);

    if(player.weapon===1){
        bullets.push({
            x:player.x,
            y:player.y,
            dx:0,
            dy:-10,
            dmg:10,
            size:5
        });
    }

    if(player.weapon===2){
        bullets.push(
            {x:player.x-10,y:player.y,dx:-1,dy:-10,dmg:8,size:4},
            {x:player.x+10,y:player.y,dx:1,dy:-10,dmg:8,size:4}
        );
    }

    if(player.weapon===3){
        for(let i=-2;i<=2;i++){
            bullets.push({
                x:player.x,
                y:player.y,
                dx:i*1.2,
                dy:-10,
                dmg:5,
                size:4
            });
        }
    }
}

setInterval(()=>{
    if(keys[" "]) shoot();
},150);

function spawnEnemy(){

    if(boss) return;

    enemies.push({
        x:Math.random()*1150,
        y:-50,
        w:40+Math.random()*40,
        h:40+Math.random()*40,
        hp:20,
        speed:2+Math.random()*3
    });
}

setInterval(spawnEnemy,800);

function createExplosion(x,y,size){

    beep(120,0.15,"sawtooth");

    for(let i=0;i<20;i++){
        explosions.push({
            x,y,
            dx:(Math.random()-0.5)*8,
            dy:(Math.random()-0.5)*8,
            life:40,
            size:size
        });
    }
}

function spawnBoss(){

    boss={
        x:450,
        y:50,
        w:300,
        h:120,
        hp:500,
        dir:4
    };
}

function update(){

    if(keys["ArrowLeft"]) player.x-=player.speed;
    if(keys["ArrowRight"]) player.x+=player.speed;
    if(keys["ArrowUp"]) player.y-=player.speed;
    if(keys["ArrowDown"]) player.y+=player.speed;

    player.x=Math.max(25,Math.min(canvas.width-25,player.x));
    player.y=Math.max(25,Math.min(canvas.height-25,player.y));

    bullets.forEach(b=>{
        b.x+=b.dx;
        b.y+=b.dy;
    });

    bullets=bullets.filter(b=>b.y>-20);

    enemies.forEach(e=>e.y+=e.speed);

    bullets.forEach((b,bi)=>{

        enemies.forEach((e,ei)=>{

            if(
                b.x<e.x+e.w &&
                b.x+b.size>e.x &&
                b.y<e.y+e.h &&
                b.y+b.size>e.y
            ){
                e.hp-=b.dmg;
                bullets.splice(bi,1);

                if(e.hp<=0){
                    createExplosion(
                        e.x+e.w/2,
                        e.y+e.h/2,
                        4
                    );
                    enemies.splice(ei,1);
                    score+=10;
                }
            }
        });

        if(boss){

            if(
                b.x<boss.x+boss.w &&
                b.x+b.size>boss.x &&
                b.y<boss.y+boss.h &&
                b.y+b.size>boss.y
            ){
                boss.hp-=b.dmg;
                bullets.splice(bi,1);

                if(boss.hp<=0){
                    createExplosion(
                        boss.x+boss.w/2,
                        boss.y+boss.h/2,
                        10
                    );
                    score+=500;
                    boss=null;
                }
            }
        }
    });

    enemies.forEach(e=>{

        if(
            player.x-player.w/2<e.x+e.w &&
            player.x+player.w/2>e.x &&
            player.y-player.h/2<e.y+e.h &&
            player.y+player.h/2>e.y
        ){
            player.hp-=10;
            createExplosion(e.x,e.y,3);
            e.hp=0;
        }
    });

    enemies=enemies.filter(e=>e.hp>0 && e.y<800);

    explosions.forEach(p=>{
        p.x+=p.dx;
        p.y+=p.dy;
        p.life--;
    });

    explosions=explosions.filter(p=>p.life>0);

    if(score>0 && score%500===0 && !boss){
        spawnBoss();
    }

    if(boss){
        boss.x+=boss.dir;

        if(boss.x<0 || boss.x+boss.w>canvas.width){
            boss.dir*=-1;
        }
    }

    if(player.hp<=0){
        alert("Game Over! Punkte: "+score);
        location.reload();
    }
}

function drawStars(){

    ctx.fillStyle="white";

    stars.forEach(s=>{
        ctx.fillRect(s.x,s.y,s.s,s.s);
        s.y+=1;

        if(s.y>canvas.height){
            s.y=0;
            s.x=Math.random()*canvas.width;
        }
    });
}

function drawPlayer(){

    ctx.fillStyle="#00ffff";

    ctx.beginPath();
    ctx.moveTo(player.x,player.y-25);
    ctx.lineTo(player.x-20,player.y+25);
    ctx.lineTo(player.x+20,player.y+25);
    ctx.fill();
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawStars();

    drawPlayer();

    ctx.fillStyle="yellow";

    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,b.size,0,Math.PI*2);
        ctx.fill();
    });

    enemies.forEach(e=>{

        ctx.fillStyle="crimson";
        ctx.fillRect(e.x,e.y,e.w,e.h);

        ctx.fillStyle="lime";
        ctx.fillRect(e.x,e.y-8,e.w*(e.hp/20),4);
    });

    if(boss){

        ctx.fillStyle="purple";
        ctx.fillRect(
            boss.x,
            boss.y,
            boss.w,
            boss.h
        );

        ctx.fillStyle="red";
        ctx.fillRect(300,20,600,25);

        ctx.fillStyle="lime";
        ctx.fillRect(
            300,
            20,
            600*(boss.hp/500),
            25
        );
    }

    explosions.forEach(p=>{

        ctx.fillStyle=
            `rgba(255,150,0,${p.life/40})`;

        ctx.beginPath();
        ctx.arc(
            p.x,
            p.y,
            p.size,
            0,
            Math.PI*2
        );
        ctx.fill();
    });

    ctx.fillStyle="white";
    ctx.font="24px Arial";

    ctx.fillText("Punkte: "+score,20,40);
    ctx.fillText("HP: "+player.hp,20,75);
    ctx.fillText("Waffe: "+player.weapon,20,110);
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
